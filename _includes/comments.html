{% assign comment_config = site.comments %}
{% if page.comments != false and comment_config.repo %}
  <section class="comments" aria-labelledby="comments-title">
    <h2 id="comments-title">留言</h2>
    <script src="https://utteranc.es/client.js"
      repo="{{ comment_config.repo }}"
      issue-term="{{ comment_config.issue_term | default: 'pathname' }}"
      label="{{ comment_config.label | default: 'comment' }}"
      theme="{{ comment_config.theme | default: 'github-light' }}"
      crossorigin="anonymous"
      async>
    </script>
    <noscript>请启用 JavaScript 查看 GitHub Issues 评论。</noscript>
  </section>
{% endif %}

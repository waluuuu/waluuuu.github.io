title: WalUU
description: Personal notes, sketches, and technical fragments.
url: "https://waluuuu.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai

markdown: kramdown
permalink: /:title/

comments:
  repo: waluuuu/waluuuu.github.io
  issue_term: pathname
  label: comment
  theme: github-light

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      math: true
  - scope:
      path: ""
    values:
      layout: default
      comments: false

exclude:
  - README.md

<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>{% if page.title and page.title != 'Home' %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% if page.math %}
      {% include mathjax.html %}
    {% endif %}
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>© {{ 'now' | date: '%Y' }} {{ site.title }}</span>
      <a href="https://github.com/{{ site.comments.repo }}/issues">Comments on GitHub Issues</a>
    </footer>
  </body>
</html>
